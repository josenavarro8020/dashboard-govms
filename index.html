<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Inteligência Política</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        riedel: '#4F46E5',
                        pollon: '#8B5CF6',
                        trad: '#10B981',
                        catan: '#F59E0B',
                        govms: '#1E293B',
                    }
                }
            }
        }
    </script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden-section { display: none; }
        .card { 
            background: white; 
            border-radius: 0.75rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
        }
        .table-header {
            background-color: #f3f4f6;
            color: #374151;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center text-xl font-bold text-gray-900">
                        PolitiDash ⚡
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-12">
        
        <div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Monitoramento de Redes e Performance</h1>
            <p class="text-base text-gray-500">Visão integrada das redes sociais e volume mensal no Google Trends.</p>
        </div>

        <section id="sec-social">
            <h2 class="text-2xl font-bold text-gray-900 border-b border-gray-200 pb-3 mb-6">Desempenho em Redes Sociais</h2>
            <!-- Candidate Cards Injected Here -->
            <div id="candidate-cards-container" class="space-y-10"></div>
        </section>

        <section id="sec-trends">
            <h2 class="text-2xl font-bold text-gray-900 border-b border-gray-200 pb-3 mb-6">Tendências do Google (Volume Mensal)</h2>
            <div class="card">
                <div class="relative h-[28rem] w-full">
                    <canvas id="chart-candidates-timeline"></canvas>
                </div>
            </div>
        </section>

        <section id="sec-queries">
            <h2 class="text-2xl font-bold text-gray-900 border-b border-gray-200 pb-3 mb-6">Termos de Busca: Principais e em Ascensão</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6" id="candidates-search-grid">
                <!-- Search Terms Grid Injected Here -->
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
